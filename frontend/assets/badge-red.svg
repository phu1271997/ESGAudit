<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGradRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#991B1B" />
      <stop offset="100%" stop-color="#450A0A" />
    </linearGradient>
    <linearGradient id="redBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#991B1B" />
    </linearGradient>
    <linearGradient id="redLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCA5A5" />
      <stop offset="100%" stop-color="#EF4444" />
    </linearGradient>
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer Ring -->
  <g filter="url(#badgeShadow)">
    <circle cx="100" cy="100" r="85" fill="url(#shieldGradRed)" stroke="url(#redBorder)" stroke-width="4" />
    
    <!-- Dotted Inner ring -->
    <circle cx="100" cy="100" r="77" fill="none" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8" />
  </g>

  <!-- Center Warning Symbol (Circle with Slash or Cross) -->
  <g transform="translate(100, 90) scale(0.9)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#redLight)" stroke-width="6.5" />
    <line x1="-15" y1="-15" x2="15" y2="15" stroke="url(#redLight)" stroke-width="6.5" />
  </g>

  <!-- Arc Text Paths -->
  <path id="textArcTop" d="M 32,100 A 68,68 0 1,1 168,100" fill="none" />
  <path id="textArcBottom" d="M 168,100 A 68,68 0 0,1 32,100" fill="none" />

  <!-- Curved Text -->
  <text font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#F3F4F6" letter-spacing="1.5">
    <textPath href="#textArcTop" startOffset="50%" text-anchor="middle">
      GREENWASHING WARNING • GENLAYER
    </textPath>
  </text>
  
  <text font-family="'Inter', sans-serif" font-size="9" font-weight="800" fill="#FCA5A5" letter-spacing="1.5">
    <textPath href="#textArcBottom" startOffset="50%" text-anchor="middle">
      * RED FLAG WARNING *
    </textPath>
  </text>
  
  <!-- Ribbon or Label underneath -->
  <g transform="translate(45, 135)">
    <rect width="110" height="22" rx="4" fill="#991B1B" stroke="url(#redBorder)" stroke-width="1.5" />
    <text x="55" y="15" font-family="'Inter', sans-serif" font-size="8.5" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">PUBLIC ALERT</text>
  </g>
</svg>
