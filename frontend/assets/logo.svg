<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.3"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Shield / Badge outer container -->
    <path d="M 40,5 C 65,5 80,15 80,45 C 80,75 55,90 40,95 C 25,90 0,75 0,45 C 0,15 15,5 40,5 Z" fill="#064E3B" filter="url(#shadow)" />
    
    <!-- Shield inner outline -->
    <path d="M 40,10 C 60,10 72,18 72,45 C 72,70 50,83 40,88 C 30,83 8,70 8,45 C 8,18 20,10 40,10 Z" fill="none" stroke="#A16207" stroke-width="2" />
    
    <!-- Stylized Leaf (Environmental E) -->
    <path d="M 40,20 C 55,20 60,35 48,50 C 40,60 40,75 40,75 C 40,75 40,60 32,50 C 20,35 25,20 40,20 Z" fill="url(#leafGrad)" />
    
    <!-- Centered Checkmark (Verification) -->
    <path d="M 32,48 L 38,54 L 50,42" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Gold accent dot representing On-Chain / Node consensus -->
    <circle cx="40" cy="72" r="3.5" fill="url(#goldGrad)" />
  </g>

  <!-- Typography -->
  <!-- "ESG" text in Serif (bold, corporate styling) -->
  <text x="115" y="72" font-family="'Playfair Display', 'Georgia', serif" font-size="44" font-weight="800" fill="#F3F4F6" letter-spacing="1">ESG</text>
  <!-- "Audit" text in Sans-Serif (clean, modern SaaS styling) -->
  <text x="212" y="72" font-family="'Inter', 'Montserrat', sans-serif" font-size="44" font-weight="300" fill="#A16207" letter-spacing="0.5">Audit</text>
  
  <!-- Subtitle -->
  <text x="118" y="94" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#9CA3AF" letter-spacing="4">GENLAYER INTELLIGENT CONTRACTS</text>
</svg>
