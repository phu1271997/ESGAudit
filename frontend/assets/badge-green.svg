<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065F46" />
      <stop offset="100%" stop-color="#022C22" />
    </linearGradient>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#92400E" />
    </linearGradient>
    <linearGradient id="leafGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer Ring (Rotated Seal shape) -->
  <g filter="url(#badgeShadow)">
    <circle cx="100" cy="100" r="85" fill="url(#shieldGrad)" stroke="url(#goldBorder)" stroke-width="4" />
    
    <!-- Dotted Inner ring -->
    <circle cx="100" cy="100" r="77" fill="none" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8" />
  </g>

  <!-- Center Decorative Leaf -->
  <path d="M 100,50 C 120,50 125,70 110,90 C 100,102 100,122 100,122 C 100,122 100,102 90,90 C 75,70 80,50 100,50 Z" fill="url(#leafGreen)" />
  
  <!-- Checkmark -->
  <path d="M 90,88 L 97,95 L 112,78" fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Arc Text Paths -->
  <path id="textArcTop" d="M 32,100 A 68,68 0 1,1 168,100" fill="none" />
  <path id="textArcBottom" d="M 168,100 A 68,68 0 0,1 32,100" fill="none" />

  <!-- Curved Text -->
  <text font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#F3F4F6" letter-spacing="2">
    <textPath href="#textArcTop" startOffset="50%" text-anchor="middle">
      ESG VERIFIED • GENLAYER
    </textPath>
  </text>
  
  <text font-family="'Inter', sans-serif" font-size="9" font-weight="800" fill="#F59E0B" letter-spacing="1.5">
    <textPath href="#textArcBottom" startOffset="50%" text-anchor="middle">
      * GREEN STATUS *
    </textPath>
  </text>
  
  <!-- Ribbon or Label underneath -->
  <g transform="translate(45, 135)">
    <rect width="110" height="22" rx="4" fill="#047857" stroke="url(#goldBorder)" stroke-width="1.5" />
    <text x="55" y="15" font-family="'Inter', sans-serif" font-size="8.5" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">GRI/SASB/TCFD</text>
  </g>
</svg>
