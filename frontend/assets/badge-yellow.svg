<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGradYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350F" />
      <stop offset="100%" stop-color="#451A03" />
    </linearGradient>
    <linearGradient id="yellowBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="amberLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <filter id="badgeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer Ring -->
  <g filter="url(#badgeShadow)">
    <circle cx="100" cy="100" r="85" fill="url(#shieldGradYellow)" stroke="url(#yellowBorder)" stroke-width="4" />
    
    <!-- Dotted Inner ring -->
    <circle cx="100" cy="100" r="77" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8" />
  </g>

  <!-- Center Warning Triangle -->
  <g transform="translate(100, 86) scale(0.9)">
    <path d="M 0,-30 L 30,22 L -30,22 Z" fill="url(#amberLight)" />
    <!-- Exclamation mark in triangle -->
    <rect x="-2.5" y="-12" width="5" height="18" fill="#451A03" rx="1" />
    <circle cx="0" cy="13" r="3" fill="#451A03" />
  </g>

  <!-- Arc Text Paths -->
  <path id="textArcTop" d="M 32,100 A 68,68 0 1,1 168,100" fill="none" />
  <path id="textArcBottom" d="M 168,100 A 68,68 0 0,1 32,100" fill="none" />

  <!-- Curved Text -->
  <text font-family="'Inter', sans-serif" font-size="10" font-weight="800" fill="#F3F4F6" letter-spacing="2">
    <textPath href="#textArcTop" startOffset="50%" text-anchor="middle">
      ESG CONDITIONAL • GENLAYER
    </textPath>
  </text>
  
  <text font-family="'Inter', sans-serif" font-size="9" font-weight="800" fill="#FBBF24" letter-spacing="1.5">
    <textPath href="#textArcBottom" startOffset="50%" text-anchor="middle">
      * YELLOW STATUS *
    </textPath>
  </text>
  
  <!-- Ribbon or Label underneath -->
  <g transform="translate(45, 135)">
    <rect width="110" height="22" rx="4" fill="#B45309" stroke="url(#yellowBorder)" stroke-width="1.5" />
    <text x="55" y="15" font-family="'Inter', sans-serif" font-size="8.5" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">REQUIRES ACTION</text>
  </g>
</svg>
